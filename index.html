<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>My Blog</h1>
            <p class="tagline">Sharing thoughts and ideas</p>
        </div>
    </header>

    <nav>
        <div class="container">
            <ul>
                <li><a href="#" class="active" data-filter="all">All Posts</a></li>
                <li><a href="#" data-filter="technology">Technology</a></li>
                <li><a href="#" data-filter="lifestyle">Lifestyle</a></li>
                <li><a href="#" data-filter="tutorial">Tutorial</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <section id="blog-posts">
            <!-- Blog posts will be dynamically inserted here -->
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 My Blog. All rights reserved.</p>
        </div>
    </footer>

    <script src="blog.js"></script>
</body>
</html>
